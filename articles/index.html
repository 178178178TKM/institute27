<style>
:root {
  --bg: #060b06; --bg2: #0a110a; --bg3: #0e180e;
  --green: #7aab6e; --green-dim: #3d6636; --green-bright: #a8d49a;
  --amber: #c8a030; --amber-dim: #7a5e12;
  --red: #9b2020; --red-bright: #cc3333;

html{scroll-behavior:smooth}

a{color:var(--green);text-decoration:none}a:hover{color:var(--green-bright)}

/* === CLEARANCE AUTH GATE === */

.auth-input-wrap{position:relative;margin-bottom:20px}
.auth-input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border2);color:var(--green-bright);font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:.15em;outline:none;transition:border-color .3s}

@media(max-width:900px){

<script>
document.addEventListener("DOMContentLoaded",function(){document.getElementById("bc-id").textContent=new URLSearchParams(window.location.search).get("id")||"unknown";});

var ARTICLE_ID = new URLSearchParams(window.location.search).get('id') || 'unknown';
var DATA_BASE = '../data/articles/';

var LEVEL_NAMES = ['PUBLIC','INTERNAL','RESTRICTED','CLASSIFIED','TOP SECRET'];

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escR(s) {
  if (!s) return '';
  var e = esc(s);
  return e.replace(/\u3000{2,}/g, function(m) {
    return '<span class="redacted">' + m + '</span>';
  });
}

var TYPE_COLORS = { IC:'ic', EN:'en', PH:'ph', FL:'fl', AN:'an' };
function typeClass(type) { return TYPE_COLORS[type] || 'fl'; }

var STATUS_MAP = {
  ACTIVE: { cls:'status-active', label:null },
  ARCHIVED: { cls:'status-archived', label:'ARCHIVED' },
  PENDING: { cls:'status-pending', label:'PENDING' },
  REDACTED: { cls:'status-redacted', label:'REDACTED' }
};
var STATUS_LABELS = {
  IC: { ACTIVE:'調査継続中' },
  PH: { ACTIVE:'観測継続中' },
  EN: { ACTIVE:'ACTIVE' },
  AN: { ACTIVE:'ACTIVE' },
  FL: { ACTIVE:'ACTIVE' }
};

function statusTag(status, type) {
  var s = STATUS_MAP[status] || STATUS_MAP.ACTIVE;
  var label = s.label;
  if (!label && STATUS_LABELS[type] && STATUS_LABELS[type][status]) label = STATUS_LABELS[type][status];
  if (!label) label = status;
  return '<span class="status-tag ' + s.cls + '">' + esc(label) + '</span>';
}

/* ===== AES-256-GCM CRYPTO MODULE ===== */
var INS27Crypto = (function() {
  function b64ToArr(b64) {
    var bin = atob(b64);
    var arr = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }
  function arrToB64(arr) {
    var bin = '';
    for (var i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
    return btoa(bin);
  }

  async function deriveKey(password, salt) {
    var enc = new TextEncoder();
    var keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encrypt(plaintext, password) {
    var enc = new TextEncoder();
    var salt = crypto.getRandomValues(new Uint8Array(16));
    var iv = crypto.getRandomValues(new Uint8Array(12));
    var key = await deriveKey(password, salt);
    var ct = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      enc.encode(plaintext)
    );
    return {
      ct: arrToB64(new Uint8Array(ct)),
      iv: arrToB64(iv),
      salt: arrToB64(salt)
    };
  }

  async function decrypt(cipherObj, password) {
    var salt = b64ToArr(cipherObj.salt);
    var iv = b64ToArr(cipherObj.iv);
    var ct = b64ToArr(cipherObj.ct);
    var key = await deriveKey(password, salt);
    var plain = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      ct
    );
    return new TextDecoder().decode(plain);
  }

  // Store/retrieve clearance per level
  function getClearance(level) {
    try {
      var stored = localStorage.getItem('ins27_cl_' + level);
      if (!stored) return null;
      return JSON.parse(stored);
    } catch(e) { return null; }
  }
  function setClearance(level, password) {
    localStorage.setItem('ins27_cl_' + level, JSON.stringify({
      pw: password,
      ts: Date.now()
    }));
  }
  function clearAllClearances() {
    for (var i = 0; i <= 4; i++) localStorage.removeItem('ins27_cl_' + i);
  }

  return {
    encrypt: encrypt,
    decrypt: decrypt,
    getClearance: getClearance,
    setClearance: setClearance,
    clearAllClearances: clearAllClearances
  };
})();

/* ===== AUTH GATE UI ===== */
function showAuthGate(articleData) {
  var container = document.getElementById('article-container');
  var level = articleData.level || 1;
  var levelName = LEVEL_NAMES[level] || 'UNKNOWN';
  var tc = typeClass(articleData.type);

  container.innerHTML =
    '<div class="auth-gate">' +
      '<div class="auth-frame">' +
        '<div class="auth-icon">⟐</div>' +
        '<div class="auth-title">CLEARANCE REQUIRED</div>' +
        '<div class="auth-subtitle">この記録の閲覧にはクリアランス認証が必要です</div>' +
        '<div class="auth-level">LEVEL ' + level + ' — ' + esc(levelName) + '</div>' +
        '<div style="text-align:left;margin-bottom:24px;font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--text-dim);line-height:2">' +
          'Record: <span style="color:var(--' + tc + ')">' + esc(articleData.id) + '</span><br>' +
          'Type: ' + esc(articleData.type_label) + '<br>' +
          'Title: <span style="color:var(--green)">' + esc(articleData.title) + '</span>' +
        '</div>' +
        '<div class="auth-input-wrap">' +
          '<input type="password" id="auth-pw" class="auth-input" placeholder="CLEARANCE CODE" autocomplete="off">' +
        '</div>' +
        '<label class="auth-remember"><input type="checkbox" id="auth-remember" checked> このデバイスに認証を記憶する</label>' +
        '<button id="auth-submit" class="auth-btn">▶ AUTHENTICATE</button>' +
        '<div id="auth-error" class="auth-error"></div>' +
      '</div>' +
    '</div>';

  var pwInput = document.getElementById('auth-pw');
  var submitBtn = document.getElementById('auth-submit');
  var errorDiv = document.getElementById('auth-error');

  function doAuth() {
    var pw = pwInput.value.trim();
    if (!pw) { errorDiv.textContent = '認証コードを入力してください'; return; }
    errorDiv.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = '▌ DECRYPTING...';
    submitBtn.style.color = 'var(--amber)';

    INS27Crypto.decrypt(articleData.cipher, pw)
      .then(function(plaintext) {
        var decrypted = JSON.parse(plaintext);
        // Merge decrypted content with metadata
        var full = Object.assign({}, articleData, decrypted);
        delete full.cipher;
        delete full.encrypted;

        // Remember clearance
        if (document.getElementById('auth-remember').checked) {
          INS27Crypto.setClearance(articleData.level, pw);
        }

        renderArticle(full);
      })
      .catch(function(e) {
        errorDiv.textContent = 'ACCESS DENIED — 認証コードが正しくありません';
        submitBtn.disabled = false;
        submitBtn.textContent = '▶ AUTHENTICATE';
        submitBtn.style.color = '';
        pwInput.value = '';
        pwInput.focus();
      });
  }

  submitBtn.addEventListener('click', doAuth);
  pwInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doAuth();
  });
  pwInput.focus();
}

/* ===== TRY AUTO-DECRYPT WITH STORED CLEARANCE ===== */
function tryAutoDecrypt(articleData) {
  var cl = INS27Crypto.getClearance(articleData.level);
  if (!cl || !cl.pw) {
    showAuthGate(articleData);
    return;
  }

  var container = document.getElementById('article-container');
  container.innerHTML = '<div class="loading"><div class="auth-decrypting">▌ CLEARANCE VERIFIED — DECRYPTING...</div></div>';

  INS27Crypto.decrypt(articleData.cipher, cl.pw)
    .then(function(plaintext) {
      var decrypted = JSON.parse(plaintext);
      var full = Object.assign({}, articleData, decrypted);
      delete full.cipher;
      delete full.encrypted;
      renderArticle(full);
    })
    .catch(function(e) {
      // Stored clearance is invalid (password changed?)
      localStorage.removeItem('ins27_cl_' + articleData.level);
      showAuthGate(articleData);
    });
}

/* ===== RENDER ARTICLE ===== */
function renderArticle(a) {
  var container = document.getElementById('article-container');
  var tc = typeClass(a.type);

  if (a.redacted || a.status === 'REDACTED') {
    container.innerHTML = '<div class="redacted-page">' +
      '<div class="redacted-icon">⟐</div>' +
      '<div class="redacted-title">ACCESS DENIED</div>' +
      '<div class="redacted-desc">この記録は Level ' + a.level + ' 以上のクリアランスが必要です。<br>アクセスにはIDカード認証が必要です。</div>' +
      '</div>';
    return;
  }

  var html = '';
  var caseNum = a.case_number ? 'Case#' + esc(a.case_number) : a.id;
  html += '<div class="article-header">';
  html += '<div class="article-case-num mono">' + esc(a.id) + ' ／ ' + caseNum + ' ／ ' + esc(a.type_label) + '</div>';
  html += '<div class="article-title">' + escR(a.title) + '</div>';
  html += '<div class="article-meta">';
  html += '<span class="cls-tag cls-' + tc + '">' + esc(a.type) + '</span>';
  html += statusTag(a.status, a.type);
  if (a.assignee) html += '<span>担当: ' + esc(a.assignee) + '</span>';
  if (a.department) html += '<span>部署: ' + esc(a.department) + '</span>';
  if (a.first_report) html += '<span>初報: ' + esc(a.first_report) + '</span>';
  html += '</div>';

  var summaryHtml = a.summary_extra || ('<p>' + escR(a.summary) + '</p>');
  if (summaryHtml.indexOf('<') === -1) summaryHtml = '<p>' + summaryHtml + '</p>';
  html += '<div class="article-summary">' + summaryHtml + '</div>';
  html += '</div>';

  if (a.report) {
    html += '<div class="article-body">';
    html += '<div class="article-content">';
    var hasStamp = a.level >= 1 ? ' has-stamp' : '';
    html += '<div class="field-report' + hasStamp + '">';
    html += '<div class="report-label">// ' + (a.type === 'PH' ? '観測' : '調査') + 'レポート — ' + esc(a.id) + '</div>';
    html += '<div class="report-header-block">' + esc(a.report.header) + '<br>' + esc(a.report.subheader) + '</div>';
    (a.report.sections || []).forEach(function(sec) {
      html += '<div class="report-section">';
      html += '<div class="report-section-title">▌ ' + esc(sec.title) + '</div>';
      var content = sec.content || '';
      if (content.indexOf('<') === -1) content = '<p>' + content + '</p>';
      html += '<div class="report-section-content">' + content + '</div>';
      if (sec.warning) html += '<div class="inline-note">⚠ ' + sec.warning + '</div>';
      if (sec.note) html += '<div class="inline-note">' + sec.note + '</div>';
      html += '</div>';
    });
    html += '</div></div>';

    html += '<div class="article-sidebar">';
    html += '<div class="sidebar-section-title">案件データ</div>';
    html += '分類: <span style="color:var(--' + tc + ')">' + esc(a.type_label) + '</span><br>';
    if (a.department) html += '担当課: ' + esc(a.department) + '<br>';
    if (a.assignee) html += '担当者: ' + esc(a.assignee) + '<br>';
    html += '閲覧Level: Level ' + a.level + '<br>';
    if (a.metadata) {
      Object.keys(a.metadata).forEach(function(k) {
        html += esc(k) + ': ' + esc(a.metadata[k]) + '<br>';
      });
    }
    html += '状態: <span style="color:var(--amber)">' + esc(a.status) + '</span>';

    if (a.related && a.related.length) {
      html += '<div class="sidebar-section-title">関連記録</div>';
      a.related.forEach(function(r) {
        var rtc = typeClass(r.id.replace(/[-\d]/g, '').replace(/_.*/,''));
        html += '<a href="?id=' + r.id + '" class="xref" style="color:var(--' + rtc + ')">' + esc(r.id) + '</a> ' + esc(r.title) + '<br>';
      });
    }
    html += '</div></div>';
  } else {
    html += '<div class="no-report">';
    html += '<div class="no-report-icon">▤</div>';
    html += '<div class="no-report-text">この記録にはレポートが含まれていません</div>';
    html += '</div>';
  }

  container.innerHTML = html;
  document.title = a.title + ' ｜ 第弐拾七研究所';
}

/* ===== CLOCK ===== */
function updateClock() {
  var n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' +
    String(n.getMinutes()).padStart(2,'0') + ':' +
    String(n.getSeconds()).padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

/* ===== FETCH & RENDER ===== */
fetch(DATA_BASE + ARTICLE_ID + '.json?v=' + Date.now())
  .then(function(r) {
    if (!r.ok) throw new Error('Article not found');
    return r.json();
  })
  .then(function(data) {
    if (data.encrypted) {
      tryAutoDecrypt(data);
    } else {
      renderArticle(data);
    }
  })
  .catch(function(e) {
    document.getElementById('article-container').innerHTML =
      '<div class="no-report"><div class="no-report-icon">✕</div>' +
      '<div class="no-report-text">記録 ' + esc(ARTICLE_ID) + ' は見つかりませんでした</div></div>';
  });
</script>
</body>
</html>
