*{margin:0;padding:0;box-sizing:border-box}

@keyframes glitch{0%,92%,100%{transform:none;opacity:1}93%{transform:translate(-2px,-1px);opacity:.8}94%{transform:translate(2px,1px);opacity:.9}95%{transform:none;opacity:1}}

.nav{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.nav a{display:inline-block;border:1px solid #3d6636;color:#7aab6e;padding:10px 20px;text-decoration:none;font-family:inherit;font-size:11px;letter-spacing:2px;transition:all .2s}
