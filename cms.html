<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第弐拾七研究所 — 管理画面</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111118;
  --surface: #1c1c26;
  --surface2: #252530;
  --surface3: #2e2e3c;
  --border: #333344;
  --border2: #44445a;
  --text: #e2e2ee;
  --text2: #9090aa;
  --text3: #55556a;
  --accent: #c9a84c;
  --accent-bg: #2a2416;
  --blue: #5080e0;
  --blue-bg: #18203a;
  --green: #40b870;
  --green-bg: #0f2a1a;
  --red: #e05050;
  --red-bg: #2a1010;
  --orange: #e08030;
  --purple: #a060d0;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
  --mono: 'Courier New', 'Noto Sans Mono', monospace;
  --radius: 8px;
  --radius-sm: 4px;
}
html { font-size: 14px; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* ════════════════ セットアップ画面 ════════════════ */
#setup-screen {
  display: none;
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 1000;
  justify-content: center; align-items: center;
}
#setup-screen.show { display: flex; }
.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px;
  max-width: 480px;
  width: 90%;
  text-align: center;
}
.setup-logo {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--accent);
  margin-bottom: 8px;
}
.setup-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.setup-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 36px;
  line-height: 1.7;
}
.setup-input-wrap { text-align: left; margin-bottom: 16px; }
.setup-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
.setup-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
}
.setup-input:focus { outline: none; border-color: var(--accent); }
.setup-hint { font-size: 11px; color: var(--text3); margin-top: 6px; }
.setup-btn {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  padding: 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: .15s;
}
.setup-btn:hover { background: #e0bc60; }

/* ════════════════ メインレイアウト ════════════════ */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ─── サイドバー ─── */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.site-name {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent);
  font-weight: bold;
}
.site-label {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.sidebar-nav { padding: 12px 8px; flex: 1; }
.nav-group { margin-bottom: 4px; }
.nav-group-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 8px 12px 4px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 12px;
  background: none;
  border: none;
  color: var(--text2);
  font-family: var(--sans);
  font-size: 13px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: .12s;
  text-align: left;
}
.nav-link:hover { background: var(--surface2); color: var(--text); }
.nav-link.active { background: var(--accent-bg); color: var(--accent); }
.nav-link-icon { font-size: 15px; width: 20px; text-align: center; }
.nav-link-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text3);
  background: var(--surface3);
  padding: 1px 8px;
  border-radius: 10px;
}
.nav-link.active .nav-link-count { background: var(--accent); color: #000; }
.sidebar-footer {
  padding: 12px 8px;
  border-top: 1px solid var(--border);
}
.sync-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  color: var(--text3);
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.sync-status.synced .sync-dot { background: var(--green); }
.sync-status.synced { color: var(--green); }
.sync-status.dirty .sync-dot { background: var(--orange); }
.sync-status.dirty { color: var(--orange); }
.sync-status.loading .sync-dot { background: var(--blue); animation: pulse 1s infinite; }
.sync-status.loading { color: var(--blue); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ─── メインエリア ─── */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ─── トップバー ─── */
.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 12px;
  flex-shrink: 0;
}
.topbar-title { font-size: 16px; font-weight: 600; color: var(--text); }
.topbar-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.publish-btn {
  background: var(--accent);
  color: #000;
  border: none;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.publish-btn:hover { background: #e0bc60; }
.publish-btn:disabled { opacity: .4; cursor: default; }
.settings-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: var(--sans);
  font-size: 13px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: .12s;
}
.settings-btn:hover { border-color: var(--text2); color: var(--text); }

/* ─── コンテンツ ─── */
.content { flex: 1; overflow-y: auto; padding: 28px 32px; }

/* ─── パネル ─── */
.panel { display: none; }
.panel.active { display: block; }

/* ─── ダッシュボード ─── */
.dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 36px; }
.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
}
.dash-card-value { font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; }
.dash-card-label { font-size: 12px; color: var(--text2); margin-top: 6px; }

.recent-articles { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.article-row {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  gap: 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: .12s;
}
.article-row:last-child { border-bottom: none; }
.article-row:hover { background: var(--surface2); }
.article-type {
  font-size: 10px;
  font-weight: bold;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.t-IC { background: #2a1a10; color: #e08030; }
.t-PH { background: #0f2a1a; color: #40c070; }
.t-EN { background: #10182a; color: #5090d0; }
.t-AN { background: #1e1028; color: #a060c0; }
.t-FL { background: #26260a; color: #c0b030; }
.article-title { flex: 1; font-size: 13px; color: var(--text); }
.article-status { font-size: 11px; }
.s-ACTIVE { color: var(--green); }
.s-ARCHIVED { color: var(--text3); }
.s-PENDING { color: var(--accent); }
.s-REDACTED { color: var(--red); }
.article-date { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* ─── 記事一覧 ─── */
.list-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.search-box {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  width: 260px;
}
.search-box:focus { outline: none; border-color: var(--accent); }
.search-box::placeholder { color: var(--text3); }
.filter-select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: var(--sans);
  font-size: 12px;
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.filter-select:focus { outline: none; border-color: var(--accent); }
.btn-new {
  margin-left: auto;
  background: var(--accent);
  color: #000;
  border: none;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: .12s;
}
.btn-new:hover { background: #e0bc60; }

.articles-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.articles-table table { width: 100%; border-collapse: collapse; }
.articles-table th {
  padding: 12px 16px;
  background: var(--surface2);
  color: var(--text3);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.articles-table td {
  padding: 13px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.articles-table tr:last-child td { border-bottom: none; }
.articles-table tr:hover td { background: var(--surface2); }
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--text3);
}
.empty-state-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state-text { font-size: 14px; }

/* ─── ボタン ─── */
.btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: var(--sans);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: .12s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--text2); color: var(--text); }
.btn-edit { }
.btn-del { border-color: var(--red-bg); color: var(--red); }
.btn-del:hover { background: var(--red-bg); border-color: var(--red); }

/* ─── モーダル ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 200;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  width: 100%;
  max-width: 860px;
  padding: 32px;
  margin: auto;
}
.modal-header {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.modal-footer {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.btn-cancel {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: var(--sans);
  font-size: 13px;
  padding: 9px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.btn-save {
  background: var(--accent);
  color: #000;
  border: none;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 24px;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.btn-save:hover { background: #e0bc60; }

/* ─── フォーム ─── */
.form-section { margin-bottom: 28px; }
.form-section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.field { margin-bottom: 16px; }
.label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 500;
}
.input, .select, .textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
}
.input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); }
.textarea { resize: vertical; line-height: 1.6; min-height: 80px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
.hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ─── セクション編集 ─── */
.report-sec {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px;
  margin-bottom: 12px;
  position: relative;
}
.report-sec-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.remove-sec-btn {
  position: absolute;
  top: 14px; right: 14px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text3);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.remove-sec-btn:hover { border-color: var(--red); color: var(--red); }
.add-sec-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border2);
  color: var(--text3);
  font-family: var(--sans);
  font-size: 12px;
  padding: 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: .12s;
  margin-top: 4px;
}
.add-sec-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── チェックボックス ─── */
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
}
.checkbox-row input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

/* ─── トースト ─── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  z-index: 400;
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
  max-width: 360px;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: var(--red); }

/* ─── 設定パネル ─── */
.settings-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 20px;
  max-width: 600px;
}
.settings-section-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
}
</style>
</head>
<body>

<!-- 初回セットアップ -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">◈ INS27-CMS</div>
    <h1 class="setup-title">管理画面にログイン</h1>
    <p class="setup-sub">
      GitHub Personal Access Token を入力して<br>
      コンテンツ管理を開始してください
    </p>
    <div class="setup-input-wrap">
      <label class="setup-label">GitHub Personal Access Token</label>
      <input type="password" id="setup-pat" class="setup-input" placeholder="github_pat_..." autocomplete="off">
      <div class="setup-hint">
        <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--accent)">github.com/settings/tokens</a> で発行（repo スコープ必須）
      </div>
    </div>
    <button class="setup-btn" onclick="doSetup()">接続して開始</button>
    <div id="setup-err" style="margin-top:12px;font-size:12px;color:var(--red);min-height:18px"></div>
  </div>
</div>

<!-- メインアプリ -->
<div id="app">
  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="site-name">◈ INS27-CMS</div>
      <div class="site-label">第弐拾七研究所</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group">
        <button class="nav-link active" data-panel="dashboard">
          <span class="nav-link-icon">⊞</span> ダッシュボード
        </button>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">コンテンツ</div>
        <button class="nav-link" data-panel="articles">
          <span class="nav-link-icon">📄</span> 記事
          <span class="nav-link-count" id="cnt-art">0</span>
        </button>
        <button class="nav-link" data-panel="glossary">
          <span class="nav-link-icon">📖</span> 用語集
          <span class="nav-link-count" id="cnt-gls">0</span>
        </button>
        <button class="nav-link" data-panel="refs">
          <span class="nav-link-icon">📚</span> 参考文献
          <span class="nav-link-count" id="cnt-ref">0</span>
        </button>
        <button class="nav-link" data-panel="org">
          <span class="nav-link-icon">🏛</span> 組織情報
        </button>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">ツール</div>
        <button class="nav-link" onclick="doValidate()">
          <span class="nav-link-icon">✓</span> バリデーション
        </button>
        <button class="nav-link" onclick="doImportFile()">
          <span class="nav-link-icon">↑</span> JSONインポート
        </button>
        <button class="nav-link" onclick="doExportAll()">
          <span class="nav-link-icon">↓</span> エクスポート
        </button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sync-status" id="sync-status">
        <span class="sync-dot"></span>
        <span id="sync-text">読み込み中...</span>
      </div>
    </div>
  </aside>

  <!-- メインエリア -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">ダッシュボード</div>
      <div class="topbar-actions">
        <a href="https://178178178tkm.github.io/institute27/" target="_blank" class="settings-btn" style="text-decoration:none">🌐 本サイトを開く</a>
        <button class="settings-btn" onclick="gotoPanel('settings')">⚙ 設定</button>
        <button class="publish-btn" id="publish-btn" onclick="publishAll()">
          ↑ 変更を公開
        </button>
      </div>
    </header>

    <div class="content">
      <!-- ダッシュボード -->
      <div class="panel active" id="panel-dashboard">
        <div class="dash-grid" id="dash-stats"></div>
        <div class="recent-articles">
          <div class="section-title">最近の記事</div>
          <div id="recent-list"></div>
        </div>
      </div>

      <!-- 記事一覧 -->
      <div class="panel" id="panel-articles">
        <div class="list-header">
          <input class="search-box" id="art-search" placeholder="🔍 タイトル・ID・担当者で検索..." oninput="renderArt()">
          <select class="filter-select" id="art-type-f" onchange="renderArt()">
            <option value="">全タイプ</option>
            <option>IC</option><option>PH</option>
            <option>EN</option><option>AN</option><option>FL</option>
          </select>
          <select class="filter-select" id="art-status-f" onchange="renderArt()">
            <option value="">全ステータス</option>
            <option>ACTIVE</option><option>ARCHIVED</option>
            <option>PENDING</option><option>REDACTED</option>
          </select>

<script>
'use strict';
var GH_REPO = '178178178TKM/institute27';
var GH_SK = 'ins27_pat_cms';
var GH_SHAS = {};
var dirty = false;
var S = {
  articles: [],
  articles_full: {},
  glossary: {terms: []},
  references: {books: []},
  organization: {leadership: [], departments: []}
};

var $ = id => document.getElementById(id) || document.querySelector(id);
var $$ = s => document.querySelectorAll(s);
function esc(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ════ PAT ════
function getPAT(){ return localStorage.getItem(GH_SK) || '' }

function setSyncStatus(state, text){
  var el = $('sync-status');
  el.className = 'sync-status ' + state;
  $('sync-text').textContent = text;
}

// ════ 初期化 ════
function init(){
  if(!getPAT()){
    $('setup-screen').classList.add('show');

  }
  loadData();
}

async function doSetup(){
  var v = $('setup-pat').value.trim();
  if(!v){ $('setup-err').textContent = 'トークンを入力してください'; return }
  $('setup-err').textContent = '';
  localStorage.setItem(GH_SK, v);

}

// ════ データ読み込み ════
async function loadData(){
  setSyncStatus('loading', '読み込み中...');
  try{
    var idx = await ghGet('data/articles-index.json');
    S.articles = idx.articles || [];
    try{ S.glossary = await ghGet('data/glossary.json') } catch(e){}
    try{ S.references = await ghGet('data/references.json') } catch(e){}
    try{ S.organization = await ghGet('data/organization.json') } catch(e){}
    setDirty(false);
    render();
    setSyncStatus('synced', '同期済み');
    toast('読み込み完了 — ' + S.articles.length + ' 件の記事', 'ok');
  } catch(e){
    setSyncStatus('', 'エラー: ' + e.message);
    toast('読み込み失敗: ' + e.message, 'err');
  }
}

async function reloadFromGH(){
  if(!confirm('GitHubから再読み込みします。未保存の変更は失われます。続けますか？')) return;
  await loadData();
}

// ════ 公開（GitHub保存）════
async function publishAll(){
  var pat = getPAT();
  if(!pat){ gotoPanel('settings'); toast('トークンを設定してください', 'err'); return }
  setSyncStatus('loading', '公開中...');
  var btn = $('publish-btn');
  btn.disabled = true;
  var ok = 0, fail = 0;
  try{
    var r = await ghPut('data/articles-index.json', {articles: S.articles}, 'cms: update articles-index');
    if(r.ok) ok++; else fail++;

    for(var id in S.articles_full){
      var art = S.articles_full[id];
      if(!art._dirty) continue;
      var artData = JSON.parse(JSON.stringify(art));
      delete artData._dirty;
      var ar = await ghPut('data/articles/' + id + '.json', artData, 'cms: update ' + id);
      if(ar.ok){ ok++; art._dirty = false; } else fail++;
    }

    var gr = await ghPut('data/glossary.json', S.glossary, 'cms: update glossary');
    if(gr.ok) ok++; else fail++;
    var rr = await ghPut('data/references.json', S.references, 'cms: update references');
    if(rr.ok) ok++; else fail++;
    var or2 = await ghPut('data/organization.json', S.organization, 'cms: update organization');
    if(or2.ok) ok++; else fail++;

    if(fail === 0){
      setDirty(false);
      setSyncStatus('synced', '公開済み');
      toast('✓ 公開完了', 'ok');
    } else {
      setSyncStatus('dirty', '一部失敗');
      toast('一部失敗 (' + ok + '成功 / ' + fail + '失敗)', 'err');
    }
  } catch(e){
    setSyncStatus('dirty', '公開エラー');
    toast('公開エラー: ' + e.message, 'err');
  }
  btn.disabled = false;
}

function setDirty(v){
  dirty = v;
  var btn = $('publish-btn');
  if(btn) btn.style.opacity = v ? '1' : '0.6';
  if(v) setSyncStatus('dirty', '未公開の変更あり');
}

// ════ GitHub API ════
function utf8b64(str){ return btoa(unescape(encodeURIComponent(str))) }

async function ghGet(path){
  var pat = getPAT();
  var url = 'https://api.github.com/repos/' + GH_REPO + '/contents/' + path;
  var r = await fetch(url, {headers: {Authorization: 'Bearer ' + pat, Accept: 'application/vnd.github.v3+json'}});
  if(!r.ok) throw new Error(path + ': ' + r.status);
  var d = await r.json();
  GH_SHAS[path] = d.sha;
  var b64 = d.content.replace(/\n/g, '');
  var bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return JSON.parse(new TextDecoder('utf-8').decode(bytes));
}

async function ghPut(path, data, msg){
  var pat = getPAT();
  var url = 'https://api.github.com/repos/' + GH_REPO + '/contents/' + path;
  var headers = {Authorization: 'Bearer ' + pat, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json'};
  if(!GH_SHAS[path]){
    var gr = await fetch(url, {headers});
    if(gr.ok){ var gd = await gr.json(); GH_SHAS[path] = gd.sha; }
  }
  var body = {message: msg, content: utf8b64(JSON.stringify(data, null, 2) + '\n')};
  if(GH_SHAS[path]) body.sha = GH_SHAS[path];
  var r = await fetch(url, {method: 'PUT', headers, body: JSON.stringify(body)});
  var rd = await r.json();
  if(rd.content) GH_SHAS[path] = rd.content.sha;
  return {ok: r.ok, msg: rd.message || ''};
}

var STATUSES = ['ACTIVE','ARCHIVED','PENDING','REDACTED'];

  if(S.articles_full[a.id]){ openArtModal(idx); return }

    toast('詳細データを読み込み中...');

    openArtModal(idx);
  } catch(e){ openArtModal(idx); }
}

  var a = isEdit ? JSON.parse(JSON.stringify(S.articles[idx])) : {
    id:'', case_number:'', type:'IC', type_label:'INCIDENT CASE',
    title:'', department:DEPTS[0], assignee:'', level:1,
    status:'ACTIVE', first_report:'', summary:'', redacted:false, has_report:true

    ? JSON.parse(JSON.stringify(S.articles_full[a.id]))

  var statOpts = STATUSES.map(s => '<option value="' + s + '"' + (s===a.status?' selected':'') + '>' + s + '</option>').join('');
  var metaStr = Object.entries(full.metadata||{}).map(e => e[0]+':'+e[1]).join('\n');
  var relStr = (full.related||[]).map(r => r.id+'|'+r.title).join('\n');

  modal(

    '<div class="form-section-title">基本情報</div>' +
    '<div class="grid-3">' +
      '<div class="field"><label class="label">ID *</label><input class="input" id="a-id" value="' + esc(a.id) + '" placeholder="IC-0001"></div>' +
      '<div class="field"><label class="label">Case#</label><input class="input" id="a-case" value="' + esc(a.case_number||'') + '"></div>' +
      '<div class="field"><label class="label">タイプ *</label><select class="select" id="a-type">' + typeOpts + '</select></div>' +
    '</div>' +
    '<div class="field"><label class="label">タイトル *</label><input class="input" id="a-title" value="' + esc(a.title) + '" style="font-size:15px"></div>' +
    '<div class="grid-4">' +
      '<div class="field"><label class="label">担当科</label><select class="select" id="a-dept">' + deptOpts + '</select></div>' +
      '<div class="field"><label class="label">担当者</label><input class="input" id="a-assignee" value="' + esc(a.assignee||'') + '"></div>' +

    '<div class="grid-2">' +
      '<div class="field"><label class="label">ステータス</label><select class="select" id="a-status">' + statOpts + '</select></div>' +
      '<div class="field"><label class="label">Redacted</label><select class="select" id="a-red"><option value="0"' + (!a.redacted?' selected':'') + '>No</option><option value="1"' + (a.redacted?' selected':'') + '>Yes（伏字）</option></select></div>' +
    '</div>' +
    '<div class="field"><label class="label">概要（一覧ページに表示）*</label><textarea class="textarea" id="a-sum">' + esc(a.summary||'') + '</textarea></div>' +
    '</div>' +

    '<div class="form-section">' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">' +
      '<div class="form-section-title" style="margin:0;border:none">詳細レポート</div>' +
      '<label class="checkbox-row"><input type="checkbox" id="a-hasrpt"' + (a.has_report?' checked':'') + '> 記事ページを公開する</label>' +
    '</div>' +
    '<div class="field"><label class="label">概要（詳細・HTML可）</label><textarea class="textarea" id="a-extra">' + esc(full.summary_extra||'') + '</textarea></div>' +
    '<div class="grid-2">' +
      '<div class="field"><label class="label">メタデータ（key:value 改行区切り）</label><textarea class="textarea" id="a-meta" style="min-height:70px">' + esc(metaStr) + '</textarea></div>' +
      '<div class="field"><label class="label">関連記録（ID|タイトル 改行区切り）</label><textarea class="textarea" id="a-rel" style="min-height:70px">' + esc(relStr) + '</textarea></div>' +
    '</div>' +
    '<div class="grid-2">' +
      '<div class="field"><label class="label">レポートヘッダー</label><input class="input" id="a-rh" value="' + esc(full.report?.header||'') + '"></div>' +
      '<div class="field"><label class="label">サブヘッダー</label><input class="input" id="a-rs" value="' + esc(full.report?.subheader||'') + '"></div>' +
    '</div>' +
    '<div id="sec-wrap">' + secHtml + '</div>' +
    '<button class="add-sec-btn" type="button" onclick="addSec()">＋ セクションを追加</button>' +
    '</div>' +

    '<div class="modal-footer">' +
      '<button class="btn-cancel" onclick="closeModal()">キャンセル</button>' +
      '<button class="btn-save" onclick="saveArt(' + (isEdit?idx:'null') + ')">' + (isEdit?'変更を保存':'記事を追加') + '</button>' +
    '</div>' +
    '</div></div>'
  );
}

function addSec(){
  var w = $('sec-wrap');
  var n = w.querySelectorAll('.report-sec').length + 1;
  var d = document.createElement('div');
  d.className = 'report-sec';
  d.innerHTML =
    '<div class="report-sec-label">セクション ' + n + '</div>' +
    '<button class="remove-sec-btn" type="button" onclick="this.parentElement.remove()">✕ 削除</button>' +
    '<div class="grid-2"><div class="field"><label class="label">セクション名</label><input class="input js-sec-t"></div>' +
    '<div class="field"><label class="label">警告文（任意）</label><input class="input js-sec-w"></div></div>' +
    '<div class="field"><label class="label">本文（HTML可）</label><textarea class="textarea js-sec-c" style="min-height:100px"></textarea></div>';
  w.appendChild(d);
}

function saveArt(idx){
  var type = document.getElementById('a-type').value;
  var entry = {
    id: document.getElementById('a-id').value.trim(),
    case_number: document.getElementById('a-case').value.trim() || null,
    type, type_label: TYPE_LABELS[type]||type,
    title: document.getElementById('a-title').value.trim(),
    department: document.getElementById('a-dept').value,
    assignee: document.getElementById('a-assignee').value.trim() || null,
    level: parseInt(document.getElementById('a-level').value) || 0,
    status: document.getElementById('a-status').value,
    first_report: document.getElementById('a-date').value.trim() || null,
    summary: document.getElementById('a-sum').value.trim(),
    redacted: document.getElementById('a-red').value === '1',
    has_report: document.getElementById('a-hasrpt').checked
  };
  if(!entry.id || !entry.title){ toast('⚠ IDとタイトルは必須です', 'err'); return }

  var secs = [];
  $$('.report-sec').forEach(el => {
    var t = el.querySelector('.js-sec-t')?.value.trim();
    var c = el.querySelector('.js-sec-c')?.value.trim();
    var w = el.querySelector('.js-sec-w')?.value.trim();
    if(t||c){ var s = {title:t||'',content:c||''}; if(w) s.warning=w; secs.push(s); }
  });

  var full = {
    ...entry,
    summary_extra: document.getElementById('a-extra').value.trim() || null,
    metadata: {}, related: [],
    report: {header: document.getElementById('a-rh').value.trim(), subheader: document.getElementById('a-rs').value.trim(), sections: secs},
    _dirty: true
  };

  document.getElementById('a-meta').value.trim().split('\n').filter(Boolean).forEach(l => {
    var p = l.indexOf(':');
    if(p>0) full.metadata[l.slice(0,p).trim()] = l.slice(p+1).trim();
  });
  document.getElementById('a-rel').value.trim().split('\n').filter(Boolean).forEach(l => {
    var parts = l.split('|');
    if(parts[0]) full.related.push({id:parts[0].trim(), title:(parts.slice(1).join('|')||'').trim()});
  });

  if(idx !== null && idx !== undefined){
    S.articles[idx] = entry; S.articles_full[entry.id] = full;
  } else {
    S.articles.push(entry); S.articles_full[entry.id] = full;
  }
  setDirty(true); closeModal(); render();
  toast('✓ 保存しました（「変更を公開」でGitHubに反映されます）');
}

function delArt(i){
  var a = S.articles[i];
  if(!confirm('「' + a.title + '」を削除しますか？')) return;
  delete S.articles_full[a.id];
  S.articles.splice(i, 1);
  setDirty(true); render(); toast('削除しました');
}

// ════ 用語集 ════
function openGlsModal(idx){
  var isEdit = idx !== undefined;
  var t = isEdit ? S.glossary.terms[idx] : {term:'',reading:'',english:'',definition:'',related:[]};
  modal(
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:560px">' +
    '<div class="modal-header">' + (isEdit?'用語を編集':'用語を追加') + '</div>' +
    '<div class="field"><label class="label">用語 *</label><input class="input" id="g-term" value="' + esc(t.term) + '"></div>' +
    '<div class="grid-2"><div class="field"><label class="label">読み</label><input class="input" id="g-read" value="' + esc(t.reading||'') + '"></div>' +
    '<div class="field"><label class="label">English</label><input class="input" id="g-en" value="' + esc(t.english||'') + '"></div></div>' +
    '<div class="field"><label class="label">定義</label><textarea class="textarea" id="g-def">' + esc(t.definition||'') + '</textarea></div>' +
    '<div class="field"><label class="label">関連（カンマ区切り）</label><input class="input" id="g-rel" value="' + esc((t.related||[]).join(', ')) + '"></div>' +
    '<div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveGls(' + (isEdit?idx:'null') + ')">' + (isEdit?'更新':'追加') + '</button></div>' +
    '</div></div>'
  );
}
function saveGls(idx){
  var obj = {term: document.getElementById('g-term').value.trim(), reading: document.getElementById('g-read').value.trim(), english: document.getElementById('g-en').value.trim(), definition: document.getElementById('g-def').value.trim(), related: document.getElementById('g-rel').value.split(',').map(s=>s.trim()).filter(Boolean)};
  if(!obj.term){toast('⚠ 用語名は必須です','err');return}
  if(idx!==null&&idx!==undefined) S.glossary.terms[idx]=obj; else S.glossary.terms.push(obj);
  setDirty(true); closeModal(); render(); toast('✓ 保存');
}
function delGls(i){ if(!confirm('削除しますか？'))return; S.glossary.terms.splice(i,1); setDirty(true); render(); toast('削除'); }

// ════ 参考文献 ════
function openRefModal(idx){

  var b = isEdit ? S.references.books[idx] : {title:'',author:'',description:'',amazon_url:''};
  modal(
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:560px">' +

    '<div class="field"><label class="label">Amazon URL</label><input class="input" id="r-url" value="' + esc(b.amazon_url||'') + '"></div>' +

function saveRef(idx){
  var obj = {title: document.getElementById('r-title').value.trim(), author: document.getElementById('r-author').value.trim(), description: document.getElementById('r-desc').value.trim(), amazon_url: document.getElementById('r-url').value.trim()||'#'};

function delRef(i){ if(!confirm('削除しますか？'))return; S.references.books.splice(i,1); setDirty(true); render(); toast('削除'); }

// ════ 組織情報 ════
function openOrgModal(){
  var o = S.organization;
  var lStr = (o.leadership||[]).map(l => l.name+'|'+l.role+'|'+l.jurisdiction+'|'+(l.departments||[]).join('・')).join('\n');
  var dStr = (o.departments||[]).map(d => d.name+'|'+(d.english||'')+'|'+(d.chief||'')+'|'+(d.staff_count||'')+'|'+(d.description||'')).join('\n');
  modal(
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">' +
    '<div class="modal-header">組織情報を編集</div>' +
    '<div class="field"><label class="label">リーダーシップ（名前|役職|管轄|部署1・部署2 / 改行区切り）</label><textarea class="textarea" id="o-lead" style="min-height:100px">' + esc(lStr) + '</textarea></div>' +
    '<div class="field"><label class="label">部署（名称|English|課長|人数|業務 / 改行区切り）</label><textarea class="textarea" id="o-dept" style="min-height:140px">' + esc(dStr) + '</textarea></div>' +
    '<div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveOrg()">更新</button></div>' +
    '</div></div>'
  );
}
function saveOrg(){
  var leadership = [];
  document.getElementById('o-lead').value.trim().split('\n').filter(Boolean).forEach(l => {
    var p=l.split('|'); if(p[0]) leadership.push({name:p[0].trim(),role:(p[1]||'').trim(),jurisdiction:(p[2]||'').trim(),departments:(p[3]||'').split('・').map(s=>s.trim()).filter(Boolean)});
  });
  var departments = [];
  document.getElementById('o-dept').value.trim().split('\n').filter(Boolean).forEach(l => {
    var p=l.split('|'); if(p[0]) departments.push({name:p[0].trim(),english:(p[1]||'').trim(),chief:(p[2]||'').trim(),staff_count:parseInt(p[3])||0,description:(p[4]||'').trim()});
  });
  S.organization = {leadership, departments};
  setDirty(true); closeModal(); render(); toast('✓ 保存');
}

// ════ 設定 ════
function saveSettings(){
  var v = document.getElementById('settings-pat').value.trim();
  if(!v){ $('settings-msg').textContent='入力が空です'; $('settings-msg').style.color='var(--red)'; return }
  localStorage.setItem(GH_SK, v);
  $('settings-msg').textContent = '✓ 保存しました';
  $('settings-msg').style.color = 'var(--green)';
  toast('✓ トークンを保存しました');
}
function clearPAT(){
  if(!confirm('トークンを削除すると再ログインが必要になります。削除しますか？')) return;
  localStorage.removeItem(GH_SK);
  location.reload();
}

// ════ インポート / エクスポート ════
function doImportFile(){
  var fi = $('f-import');
  fi.onchange = function(e){
    var file = e.target.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        var name = file.name.replace('.json','');
        if(name.includes('articles-index')||data.articles){ S.articles=data.articles||[]; }
        else if(data.id&&(data.report||data.summary)){ S.articles_full[data.id]=Object.assign(data,{_dirty:true}); }
        else if(name.includes('glossary')||data.terms){ S.glossary={terms:data.terms||[]}; }
        else if(name.includes('reference')||data.books){ S.references={books:data.books||[]}; }
        else if(name.includes('org')||data.departments){ S.organization=data; }
        else { toast('ファイル種別を判別できません','err'); return; }
        setDirty(true); render(); toast('✓ インポート完了','ok');
      } catch(err){ toast('JSON パースエラー','err'); }
    };
    reader.readAsText(file); fi.value='';
  };
  fi.click();
}
function dlJSON(data, filename){
  var blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
function doExportAll(){
  dlJSON({articles:S.articles},'articles-index.json');
  setTimeout(()=>dlJSON(S.glossary,'glossary.json'),200);
  setTimeout(()=>dlJSON(S.references,'references.json'),400);
  setTimeout(()=>dlJSON(S.organization,'organization.json'),600);
  toast('✓ 4ファイルをダウンロード','ok');
}

// ════ バリデーション ════
function doValidate(){
  var errs=[], ids={};
  S.articles.forEach((a,i)=>{
    var ctx='['+i+'] '+(a.id||'?');
    if(!a.id) errs.push(ctx+': ID未設定');
    if(!a.title) errs.push(ctx+': タイトル未設定');
    if(!['IC','PH','EN','AN','FL'].includes(a.type)) errs.push(ctx+': 不正タイプ"'+a.type+'"');
    if(a.id&&ids[a.id]) errs.push(ctx+': ID重複');
    if(a.id) ids[a.id]=true;
  });
  S.glossary.terms.forEach((t,i)=>{ if(!t.term) errs.push('用語['+i+']: 名前未設定'); });
  var h = '<div style="font-size:13px;color:var(--text2);margin-bottom:16px">記事: <strong style="color:var(--text)">' + S.articles.length + '</strong>件　用語: <strong style="color:var(--text)">' + S.glossary.terms.length + '</strong>件　文献: <strong style="color:var(--text)">' + S.references.books.length + '</strong>件</div>';
  h += errs.length
    ? '<div style="color:var(--red);margin-bottom:8px">⚠ ' + errs.length + ' 件のエラー</div>' + errs.map(e=>'<div style="padding:3px 0;font-size:12px;color:var(--red)">✗ '+esc(e)+'</div>').join('')
    : '<div style="color:var(--green);font-size:14px">✓ 問題なし</div>';
  modal('<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:500px"><div class="modal-header">バリデーション結果</div>' + h + '<div class="modal-footer"><button class="btn-save" onclick="closeModal()">閉じる</button></div></div></div>');
}

// ════ ユーティリティ ════
function toast(msg, type){
  var el = $('toast-el');
  el.className = 'toast' + (type?' '+type:'');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 3500);
}
function modal(h){ $('modal-root').innerHTML = h; }
function closeModal(){ $('modal-root').innerHTML = ''; }

// ════ 起動 ════
if($('settings-pat')) $('settings-pat').value = getPAT();
render();
init();
</script>
